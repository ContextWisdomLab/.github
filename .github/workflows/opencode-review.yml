            printf -v base_fetch_ref '%q' "$base_ref"
            printf -v base_origin_ref '%q' "origin/${base_ref}"
            printf -v head_push_ref '%q' "HEAD:${head_ref}"
            printf '\n## Merge Conflict Guidance\n\n'
            printf '%s\n' "- Current merge state: \`${merge_state}\`"
